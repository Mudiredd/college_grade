<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — SR & BGNR College Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0709;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(28,15,19,.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid #ffffff11;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      animation: fadeInUp .5s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #d4405e, #96263e);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 12px;
    }
    .logo h1 { font-size: 1.6rem; color: #d4405e; margin-bottom: 6px; }
    .logo p  { color: #aaa; font-size: 0.88rem; }
    .flash-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
      animation: fadeInUp .3s ease;
    }
    .flash-error { background: #ff525222; color: #ff5252; border: 1px solid #ff525244; }
    .flash-info  { background: #d4405e22; color: #d4405e; border: 1px solid #d4405e44; }
    .desc {
      color: #c09898; font-size: 0.85rem; text-align: center;
      margin-bottom: 24px; line-height: 1.6;
    }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    input[type="email"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 2px solid #ffffff11;
      background: #0d0709;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #d4405e; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #d4405e, #96263e);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
      margin-top: 6px;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .links { text-align: center; margin-top: 20px; font-size: 0.85rem; }
    .links a {
      color: #d4405e; text-decoration: none; display: inline-flex;
      align-items: center; gap: 6px; font-weight: 600;
      padding: 8px 16px; border-radius: 10px;
      transition: background 0.2s;
    }
    .links a:hover { background: #d4405e11; text-decoration: none; }
    .divider { border: none; border-top: 1px solid #ffffff11; margin: 24px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h1>SR & BGNR</h1>
    <p>Reset your password</p>
  </div>

  <p class="desc">Enter your registered email and we'll send you a reset link valid for 30 minutes.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-msg flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.forgot_password') }}">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@email.com" required />
    </div>
    <button type="submit" class="btn-primary">Send Reset Link</button>
  </form>

  <hr class="divider" />
  <div class="links">
    <a href="{{ url_for('auth.login') }}">← Back to Sign In</a>
  </div>
</div>
</body>
</html>
