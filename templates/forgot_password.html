<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — SR & BGNR College Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #ffffff11;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.6rem; color: #00d4ff; margin-bottom: 6px; }
    .logo p  { color: #aaa; font-size: 0.88rem; }
    .flash-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .flash-error { background: #ff525222; color: #ff5252; border: 1px solid #ff525244; }
    .flash-info  { background: #00d4ff22; color: #00d4ff; border: 1px solid #00d4ff44; }
    .desc { color: #aaa; font-size: 0.85rem; text-align: center; margin-bottom: 24px; line-height: 1.6; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    input[type="email"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 2px solid #ffffff11;
      background: #0f0f1a;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #00d4ff; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #0077ff);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s;
      margin-top: 6px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .links { text-align: center; margin-top: 20px; font-size: 0.85rem; }
    .links a { color: #00d4ff; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid #ffffff11; margin: 24px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🎓 SR & BGNR</h1>
    <p>Reset your password</p>
  </div>

  <p class="desc">Enter your registered email and we'll send you a reset link valid for 30 minutes.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-msg flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.forgot_password') }}">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@email.com" required />
    </div>
    <button type="submit" class="btn-primary">Send Reset Link</button>
  </form>

  <hr class="divider" />
  <div class="links">
    <a href="{{ url_for('auth.login') }}">← Back to Sign In</a>
  </div>
</div>
</body>
</html>
