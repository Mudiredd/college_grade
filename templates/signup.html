<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — SR & BGNR College Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0709;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1c0f13;
      border: 1px solid #ffffff11;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.6rem; color: #d4405e; margin-bottom: 6px; }
    .logo p  { color: #aaa; font-size: 0.88rem; }
    .flash-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .flash-error   { background: #ff525222; color: #ff5252; border: 1px solid #ff525244; }
    .flash-success { background: #00e67622; color: #00e676; border: 1px solid #00e67644; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 2px solid #ffffff11;
      background: #0d0709;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #d4405e; }
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #666; cursor: pointer;
      font-size: 1.1rem; padding: 4px; line-height: 1;
    }
    .pw-toggle:hover { color: #aaa; }
    .hint { font-size: 0.78rem; color: #aaa; margin-top: 5px; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #d4405e, #96263e);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s;
      margin-top: 6px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .links { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #aaa; }
    .links a { color: #d4405e; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid #ffffff11; margin: 24px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🎓 SR & BGNR</h1>
    <p>College Tracker — Create Account</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-msg flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.signup') }}">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Your full name" required />
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@email.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="signupPw" placeholder="Min. 6 characters" required minlength="6" />
        <button type="button" class="pw-toggle" onclick="togglePW('signupPw',this)">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-primary">Create Account</button>
  </form>

  <hr class="divider" />
  <div class="links">
    Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a>
  </div>
  </div>
<script>
function togglePW(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
