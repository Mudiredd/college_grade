<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SR & BGNR College Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0709;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1c0f13;
      border: 1px solid #ffffff11;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.6rem; color: #d4405e; margin-bottom: 6px; }
    .logo p  { color: #aaa; font-size: 0.88rem; }
    .flash-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .flash-error   { background: #ff525222; color: #ff5252; border: 1px solid #ff525244; }
    .flash-success { background: #00e67622; color: #00e676; border: 1px solid #00e67644; }
    .flash-info    { background: #d4405e22; color: #d4405e; border: 1px solid #d4405e44; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 2px solid #ffffff11;
      background: #0d0709;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #d4405e; }
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #666; cursor: pointer;
      font-size: 1.1rem; padding: 4px; line-height: 1;
    }
    .pw-toggle:hover { color: #aaa; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #d4405e, #96263e);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s;
      margin-top: 6px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-google {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1px solid #ffffff1a;
      background: #ffffff08;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.3px;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .btn-google:hover {
      background: #ffffff14;
      border-color: #ffffff33;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .btn-google:active {
      transform: translateY(0);
      box-shadow: none;
    }
    .btn-admin {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ffd74033;
      background: #ffd74011;
      color: #ffd740;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-admin:hover { background: #ffd74022; }
    .links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .links a { color: #d4405e; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid #ffffff11; margin: 24px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🎓 SR & BGNR</h1>
    <p>College Tracker — Sign In</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-msg flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@email.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="loginPw" placeholder="••••••••" required />
        <button type="button" class="pw-toggle" onclick="togglePW('loginPw',this)">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-primary">Sign In</button>
  </form>

  <hr class="divider" />

  <a href="{{ url_for('auth.google_login') }}" class="btn-google">
    <svg viewBox="0 0 48 48" width="20" height="20" aria-hidden="true">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continue with Google
  </a>

  <hr class="divider" />

  <div class="links">
    <span><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></span>
    <span>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a></span>
  </div>

  <a href="{{ url_for('admin.admin_login') }}" class="btn-admin">🔐 Admin</a>
</div>
<script>
function togglePW(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
