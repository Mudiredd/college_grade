<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — SR & BGNR College Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #ffffff11;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.6rem; color: #00d4ff; margin-bottom: 6px; }
    .logo p  { color: #aaa; font-size: 0.88rem; }
    .flash-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .flash-error   { background: #ff525222; color: #ff5252; border: 1px solid #ff525244; }
    .flash-success { background: #00e67622; color: #00e676; border: 1px solid #00e67644; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 2px solid #ffffff11;
      background: #0f0f1a;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #00d4ff; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #0077ff);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s;
      margin-top: 6px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .links { text-align: center; margin-top: 20px; font-size: 0.85rem; }
    .links a { color: #00d4ff; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid #ffffff11; margin: 24px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🎓 SR & BGNR</h1>
    <p>Set a new password</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-msg flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" name="password" id="pw" placeholder="Min. 6 characters" required minlength="6" />
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm" id="cpw" placeholder="Repeat password" required minlength="6"
             oninput="checkMatch()" />
      <div id="matchMsg" style="font-size:0.78rem; margin-top:5px;"></div>
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">Reset Password</button>
  </form>

  <hr class="divider" />
  <div class="links"><a href="{{ url_for('auth.login') }}">← Back to Sign In</a></div>
</div>
<script>
  function checkMatch() {
    const pw  = document.getElementById('pw').value;
    const cpw = document.getElementById('cpw').value;
    const msg = document.getElementById('matchMsg');
    const btn = document.getElementById('submitBtn');
    if (cpw === pw) {
      msg.style.color = '#00e676';
      msg.textContent = '✅ Passwords match';
      btn.disabled = false;
    } else {
      msg.style.color = '#ff5252';
      msg.textContent = '❌ Passwords do not match';
      btn.disabled = true;
    }
  }
</script>
</body>
</html>
